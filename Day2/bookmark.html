<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Manager -Shivam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Bookmark Manager Shivam</h1>
    <h2>Primary Bookmarks</h2><!--use (alt+shift+downarrow & alt+click)-->
    <p><a target:_blank href="https://www.google.com">Google</a></p>
    <p><a target:_blank href="https://www.youtube.com">Youtube</a></p>
    <h3>Secondary Bookmarks</h3><!--target:_blank(attribute) used to open link directly to other Tab-->
    <p><a target:_blank href="https://www.e-kalyan.com">E-kalyan</a></p>
    <p><a target:_blank href="https://www.sahara.com">Sahara</a></p>
    <p><a target:_blank href="https://uidai.gov.in">Uidai</a></p>
    <script src="script.js"></script>
</body>
</html>
